# ALTERNATIVE deployment. The API currently ships to Vercel as a serverless
# function (see server/vercel.json + server/api/index.js, and the Deploying
# section of the README) — this blueprint is kept for running it on Render as a
# long-lived container instead, which buys a shared in-memory rate limiter and no
# cold starts. Nothing reads this file unless you point Render at it.
#
# Render blueprint for the API: New > Blueprint, or configure the same values by
# hand in the UI. The frontend is NOT here — it goes to Vercel.
services:
  - type: web
    name: buddyscript-api
    runtime: node
    plan: free
    region: oregon

    # The Express app lives in /server, so build and start from there.
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      # Render injects PORT; the server already reads it from the environment.

      # Set these in the Render dashboard (marked sync:false so they are NOT
      # committed here). MONGODB_URI is your Atlas connection string, and the two
      # JWT secrets must be fresh random values — generate each with:
      #   node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

      # Cloudinary — post images are uploaded here rather than to the container's
      # disk. The API secret is a credential, so it is set in the dashboard too;
      # the cloud name is not (it is in every delivery URL) but is kept alongside
      # it so all three are configured in one place.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: CLOUDINARY_FOLDER
        value: buddyscript/posts

      - key: MONGODB_DB
        value: buddyscript
      - key: JWT_EXPIRY
        value: 24h
      - key: JWT_REFRESH_EXPIRY
        value: 30d

      # Only used when the browser talks to this API cross-origin. With the
      # Vercel rewrite in client/vercel.json the browser stays on one origin, so
      # CORS is not exercised — this is here as a fallback. Set it to your Vercel
      # URL, e.g. https://buddyscript.vercel.app
      - key: CLIENT_ORIGIN
        sync: false

    # No disk is needed. Post images go to Cloudinary, so nothing durable is kept
    # on this container's filesystem — which is what makes Render's ephemeral
    # free-tier disk (wiped on every redeploy and on idle spin-down) a non-issue.
